<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEXUS — AI Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #080a0f;
    --bg2:      #0d1017;
    --bg3:      #121720;
    --border:   #1e2a3a;
    --accent:   #00d4ff;
    --accent2:  #0099cc;
    --green:    #00ff88;
    --orange:   #ff8c00;
    --red:      #ff3366;
    --text:     #c8d8e8;
    --dim:      #4a6070;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Rajdhani', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ─────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--mono);
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-hex {
    width: 24px; height: 24px;
    background: var(--accent);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex; align-items: center; justify-content: center;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.7; transform:scale(0.95); }
  }

  .status-row {
    display: flex; align-items: center; gap: 12px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: blink 2s ease infinite;
  }
  @keyframes blink { 0%,90%,100%{opacity:1} 95%{opacity:0.2} }

  .status-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--green);
    letter-spacing: 2px;
  }

  .header-btns {
    display: flex; gap: 8px;
  }

  .hbtn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: var(--mono);
    font-size: 0.6rem;
    padding: 4px 10px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .hbtn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── AGENT MODE TABS ─────────────────── */
  .mode-bar {
    display: flex;
    gap: 2px;
    padding: 8px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
  }
  .mode-bar::-webkit-scrollbar { display: none; }

  .mode-tab {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 2px;
    padding: 5px 12px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .mode-tab:hover { color: var(--text); border-color: var(--border); }
  .mode-tab.active {
    background: rgba(0, 212, 255, 0.08);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── CHAT AREA ───────────────────────── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); }

  /* Boot message */
  .boot-msg {
    text-align: center;
    padding: 30px 0 10px;
  }
  .boot-hex {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
  }
  .boot-title {
    font-family: var(--mono);
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: 6px;
  }
  .boot-sub {
    font-size: 0.75rem;
    color: var(--dim);
    font-family: var(--mono);
    margin-top: 6px;
    letter-spacing: 2px;
  }

  /* Quick actions */
  .quick-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 20px;
    max-width: 400px;
    margin-inline: auto;
    width: 100%;
  }
  .qbtn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 1px;
    padding: 10px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }
  .qbtn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.04);
  }
  .qbtn-icon { font-size: 0.9rem; display: block; margin-bottom: 4px; }

  /* ── MESSAGES ────────────────────────── */
  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 90%;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .msg.user  { align-self: flex-end; align-items: flex-end; }
  .msg.nexus { align-self: flex-start; align-items: flex-start; }

  .msg-meta {
    font-family: var(--mono);
    font-size: 0.55rem;
    color: var(--dim);
    letter-spacing: 1px;
    display: flex; gap: 8px; align-items: center;
  }
  .msg-badge {
    padding: 1px 6px;
    font-size: 0.5rem;
    letter-spacing: 1px;
    border: 1px solid var(--border);
  }
  .badge-coder    { border-color: var(--green); color: var(--green); }
  .badge-research { border-color: var(--orange); color: var(--orange); }
  .badge-planner  { border-color: #a0f; color: #a0f; }
  .badge-executor { border-color: var(--red); color: var(--red); }
  .badge-controller { border-color: var(--accent); color: var(--accent); }

  .msg-bubble {
    padding: 10px 14px;
    font-size: 0.85rem;
    line-height: 1.6;
    border: 1px solid var(--border);
  }

  .msg.user .msg-bubble {
    background: rgba(0,212,255,0.06);
    border-color: rgba(0,212,255,0.2);
    color: var(--text);
  }

  .msg.nexus .msg-bubble {
    background: var(--bg3);
    color: var(--text);
  }

  /* Code blocks */
  .msg-bubble pre {
    background: #0a0d12;
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 0;
    overflow-x: auto;
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--green);
  }

  /* Image */
  .nexus-image {
    max-width: 280px;
    border: 1px solid var(--border);
    display: block;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    width: fit-content;
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 2px;
  }
  .typing-dots { display: flex; gap: 3px; }
  .typing-dots span {
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: dot 1.2s ease infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot {
    0%,60%,100% { transform: scale(1); opacity:0.4; }
    30%          { transform: scale(1.3); opacity:1; }
  }

  /* ── INPUT AREA ──────────────────────── */
  .input-area {
    border-top: 1px solid var(--border);
    background: var(--bg2);
    padding: 10px 16px;
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .input-prefix {
    font-family: var(--mono);
    color: var(--accent);
    font-size: 0.85rem;
    padding-bottom: 10px;
    flex-shrink: 0;
  }

  #msgInput {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 8px 0;
    outline: none;
    resize: none;
    min-height: 36px;
    max-height: 100px;
    line-height: 1.5;
    caret-color: var(--accent);
  }
  #msgInput::placeholder { color: var(--dim); }
  #msgInput:focus { border-bottom-color: var(--accent); }

  .send-btn {
    background: var(--accent);
    border: none;
    color: var(--bg);
    width: 36px; height: 36px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  }
  .send-btn:hover { background: var(--green); transform: scale(1.05); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  .mic-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    width: 34px; height: 34px;
    cursor: pointer;
    font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .mic-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mic-btn.active { border-color: var(--red); color: var(--red); animation: micPulse 0.8s ease infinite; }
  @keyframes micPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .input-footer {
    display: flex; justify-content: space-between;
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 0.55rem;
    color: var(--dim);
  }

  /* Intent badge */
  .intent-tag {
    font-family: var(--mono);
    font-size: 0.5rem;
    letter-spacing: 1px;
    padding: 1px 6px;
    border: 1px solid var(--dim);
    color: var(--dim);
  }

  @media (max-width: 480px) {
    .quick-grid { grid-template-columns: 1fr 1fr; }
    .msg { max-width: 96%; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-hex"></div>
    NEXUS
  </div>
  <div class="status-row">
    <div class="status-dot"></div>
    <span class="status-label">ONLINE</span>
  </div>
  <div class="header-btns">
    <button class="hbtn" onclick="clearMemory()">CLEAR</button>
    <button class="hbtn" onclick="showStatus()">STATUS</button>
  </div>
</header>

<!-- MODE TABS -->
<div class="mode-bar">
  <button class="mode-tab active" data-mode="auto" onclick="setMode(this,'auto')">⬡ AUTO</button>
  <button class="mode-tab" data-mode="assistant" onclick="setMode(this,'assistant')">ASSISTANT</button>
  <button class="mode-tab" data-mode="coder" onclick="setMode(this,'coder')">CODER</button>
  <button class="mode-tab" data-mode="research" onclick="setMode(this,'research')">RESEARCH</button>
  <button class="mode-tab" data-mode="planner" onclick="setMode(this,'planner')">PLANNER</button>
  <button class="mode-tab" data-mode="executor" onclick="setMode(this,'executor')">EXECUTOR</button>
</div>

<!-- CHAT AREA -->
<div class="chat-area" id="chatArea">
  <div class="boot-msg">
    <div class="boot-hex">⬡</div>
    <div class="boot-title">NEXUS</div>
    <div class="boot-sub">NEURAL EXECUTION & UNDERSTANDING SYSTEM v2.0</div>
    <div class="quick-grid">
      <button class="qbtn" onclick="quickSend('What can you do?')">
        <span class="qbtn-icon">⚡</span>CAPABILITIES
      </button>
      <button class="qbtn" onclick="quickSend('What is the weather in Delhi?')">
        <span class="qbtn-icon">◈</span>WEATHER
      </button>
      <button class="qbtn" onclick="quickSend('Show me latest news')">
        <span class="qbtn-icon">◉</span>NEWS
      </button>
      <button class="qbtn" onclick="quickSend('Write a Python function to sort a list')">
        <span class="qbtn-icon">⌗</span>CODE
      </button>
      <button class="qbtn" onclick="quickSend('Plan my morning routine')">
        <span class="qbtn-icon">▣</span>PLAN
      </button>
      <button class="qbtn" onclick="quickSend('Motivate me')">
        <span class="qbtn-icon">◆</span>MOTIVATE
      </button>
    </div>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-row">
    <span class="input-prefix">›</span>
    <textarea id="msgInput" rows="1" placeholder="Enter command or query..." 
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="mic-btn" id="micBtn" onclick="toggleVoice()" title="Voice Input">🎤</button>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">▶</button>
  </div>
  <div class="input-footer">
    <span id="intentDisplay">INTENT: READY</span>
    <span id="modeDisplay">MODE: AUTO</span>
  </div>
</div>

<script>
const API = "";
let currentMode = "auto";
let isLoading   = false;
let recognition = null;
let isListening = false;

// ── MODE SELECTION ──────────────────────
function setMode(el, mode) {
  document.querySelectorAll(".mode-tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  currentMode = mode;
  document.getElementById("modeDisplay").textContent = `MODE: ${mode.toUpperCase()}`;
}

// ── QUICK SEND ──────────────────────────
function quickSend(text) {
  document.getElementById("msgInput").value = text;
  sendMessage();
}

// ── HANDLE KEY ──────────────────────────
function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 100) + "px";
}

// ── VOICE INPUT ─────────────────────────
function toggleVoice() {
  if (!("webkitSpeechRecognition" in window || "SpeechRecognition" in window)) {
    alert("Voice input not supported on this browser.");
    return;
  }
  if (isListening) {
    recognition?.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "en-IN";
  recognition.interimResults = false;
  recognition.onstart = () => {
    isListening = true;
    document.getElementById("micBtn").classList.add("active");
  };
  recognition.onresult = (e) => {
    document.getElementById("msgInput").value = e.results[0][0].transcript;
    autoResize(document.getElementById("msgInput"));
    sendMessage();
  };
  recognition.onend = () => {
    isListening = false;
    document.getElementById("micBtn").classList.remove("active");
  };
  recognition.start();
}

// ── SEND MESSAGE ─────────────────────────
async function sendMessage() {
  const input = document.getElementById("msgInput");
  const msg   = input.value.trim();
  if (!msg || isLoading) return;

  input.value = "";
  input.style.height = "auto";
  isLoading = true;
  document.getElementById("sendBtn").disabled = true;

  // Remove boot screen
  const boot = document.querySelector(".boot-msg");
  if (boot) boot.remove();

  // Detect intent display
  updateIntentDisplay(msg);

  // Add user message
  addMessage("user", msg);

  // Show typing
  const typing = addTyping();

  try {
    const body = { message: msg, userId: "default" };
    if (currentMode !== "auto") body.mode = currentMode;

    const res  = await fetch(`${API}/api/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });

    const data = await res.json();
    typing.remove();

    if (data.imageUrl) {
      addImageMessage(data.reply, data.imageUrl, data.agent);
    } else {
      addMessage("nexus", data.reply, data.agent, data.intent);
    }

  } catch (e) {
    typing.remove();
    addMessage("nexus", "Connection error. Check your server.", "controller", "ERROR");
  }

  isLoading = false;
  document.getElementById("sendBtn").disabled = false;
  input.focus();
}

// ── ADD MESSAGE ──────────────────────────
function addMessage(role, text, agent = null, intent = null) {
  const area = document.getElementById("chatArea");
  const div  = document.createElement("div");
  div.className = `msg ${role}`;

  const metaEl = document.createElement("div");
  metaEl.className = "msg-meta";
  metaEl.innerHTML = role === "user"
    ? `<span>YOU</span>`
    : `<span>NEXUS</span>${agent && agent !== "assistant" ? `<span class="msg-badge badge-${agent}">${agent.toUpperCase()}</span>` : ""}${intent ? `<span class="intent-tag">${intent}</span>` : ""}`;

  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.innerHTML = formatText(text);

  div.appendChild(metaEl);
  div.appendChild(bubble);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addImageMessage(reply, imageUrl, agent) {
  const area = document.getElementById("chatArea");
  const div  = document.createElement("div");
  div.className = "msg nexus";
  div.innerHTML = `
    <div class="msg-meta"><span>NEXUS</span><span class="msg-badge badge-executor">IMAGE</span></div>
    <div class="msg-bubble">${reply}</div>
    <img src="${imageUrl}" class="nexus-image" alt="Generated image" loading="lazy"/>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addTyping() {
  const area = document.getElementById("chatArea");
  const div  = document.createElement("div");
  div.className = "msg nexus";
  div.innerHTML = `
    <div class="msg-meta"><span>NEXUS</span></div>
    <div class="typing-indicator">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      PROCESSING
    </div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

// ── FORMAT TEXT ──────────────────────────
function formatText(text) {
  return text
    .replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escapeHtml(code.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g, `<code style="background:#0a0d12;padding:1px 4px;font-family:var(--mono);font-size:0.75rem;color:var(--green)">$1</code>`)
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\n/g, "<br/>");
}

function escapeHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── INTENT DISPLAY ───────────────────────
const INTENT_WORDS = {
  code:["code","function","script","debug","html","css","python","javascript"],
  weather:["weather","mausam","temperature"],
  news:["news","headline","khabar"],
  calculate:["calculate","calc","+","-","*","/","%"],
  plan:["plan","schedule","roadmap"],
  search:["search","find","who is","what is"],
};
function updateIntentDisplay(msg) {
  const lower = msg.toLowerCase();
  let intent  = "QUERY";
  for (const [k,words] of Object.entries(INTENT_WORDS)) {
    if (words.some(w => lower.includes(w))) { intent = k.toUpperCase(); break; }
  }
  document.getElementById("intentDisplay").textContent = `INTENT: ${intent}`;
}

// ── CLEAR MEMORY ─────────────────────────
async function clearMemory() {
  if (!confirm("Clear all memory?")) return;
  await fetch(`${API}/api/memory/clear`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ userId: "default" }),
  });
  document.getElementById("chatArea").innerHTML = `
    <div style="text-align:center;padding:20px;font-family:var(--mono);color:var(--dim);font-size:0.7rem;letter-spacing:2px;">
      MEMORY CLEARED. SYSTEM RESET.
    </div>`;
}

// ── STATUS ───────────────────────────────
async function showStatus() {
  try {
    const res  = await fetch(`${API}/api/status`);
    const data = await res.json();
    const boot = document.querySelector(".boot-msg");
    if (boot) boot.remove();
    addMessage("nexus", `NEXUS v${data.version} — ${data.status.toUpperCase()}\nAgents: ${data.agents.join(", ")}\nTools: ${data.tools.join(", ")}`, "controller", "SYSTEM");
  } catch {
    addMessage("nexus", "Status check failed. Server may be offline.", "controller", "ERROR");
  }
}
</script>
</body>
</html>
